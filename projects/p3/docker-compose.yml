services:
  postgres:
    image: postgres:17
    container_name: linguaclass-p3-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: lingua
      POSTGRES_PASSWORD: lingua
      POSTGRES_DB: linguaclass_p3
    ports:
      - "5434:5432"
    volumes:
      - postgres_data_p3:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lingua -d linguaclass_p3"]
      interval: 5s
      timeout: 5s
      retries: 10

  mailhog:
    image: mailhog/mailhog:latest
    container_name: linguaclass-p3-mailhog
    restart: unless-stopped
    ports:
      - "1027:1025"
      - "8027:8025"

  # 마이그레이션 전용 1회성 서비스 — app 과 동일 이미지 사용(전체 node_modules 포함).
  # 별도 migrate 이미지가 없어 배포 시 이미지 하나만 전송하면 된다.
  migrate:
    image: linguaclass-p3-app:latest
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://lingua:lingua@postgres:5432/linguaclass_p3
    # db push(스키마 동기화) 후 seed(멱등) 실행 — 배포 DB에 관리자·강사·샘플 강의 채움
    command: sh -c "npx prisma db push && npx tsx prisma/seed.ts"
    restart: "no"

  app:
    image: linguaclass-p3-app:latest
    build:
      context: .
      dockerfile: Dockerfile
      args:
        # NEXT_PUBLIC_* 는 빌드 타임에 인라인되므로 build arg 로도 전달
        NEXT_PUBLIC_TOSS_CLIENT_KEY: ${NEXT_PUBLIC_TOSS_CLIENT_KEY}
    container_name: linguaclass-p3-app
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    ports:
      # 로컬은 3002, EC2 는 .env 에 APP_PORT=80 으로 열린 포트에 매핑
      - "${APP_PORT:-3002}:3002"
    environment:
      DATABASE_URL: postgresql://lingua:lingua@postgres:5432/linguaclass_p3
      AUTH_SECRET: ${AUTH_SECRET}
      AUTH_URL: ${AUTH_URL:-http://localhost:3002}
      NEXTAUTH_URL: ${AUTH_URL:-http://localhost:3002}
      # 공개 호스트(IP/도메인) 신뢰 — 미설정 시 세션이 안 붙어 로그인 루프
      AUTH_TRUST_HOST: "true"
      # 실제 메일을 쓰려면 .env 에 SMTP_HOST/USER/PASS 를 넣으면 됨 (없으면 MailHog)
      SMTP_HOST: ${SMTP_HOST:-mailhog}
      SMTP_PORT: ${SMTP_PORT:-1025}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      SMTP_FROM: ${SMTP_FROM:-noreply@linguaclass.local}
      CRON_SECRET: ${CRON_SECRET}
      NEXT_PUBLIC_TOSS_CLIENT_KEY: ${NEXT_PUBLIC_TOSS_CLIENT_KEY}
      TOSS_SECRET_KEY: ${TOSS_SECRET_KEY}
    command: node server.js

volumes:
  postgres_data_p3:
