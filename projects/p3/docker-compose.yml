services:
  postgres:
    image: postgres:17
    container_name: linguaclass-p3-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: lingua
      POSTGRES_PASSWORD: lingua
      POSTGRES_DB: linguaclass_p3
    ports:
      - "5434:5432"
    volumes:
      - postgres_data_p3:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lingua -d linguaclass_p3"]
      interval: 5s
      timeout: 5s
      retries: 10

  mailhog:
    image: mailhog/mailhog:latest
    container_name: linguaclass-p3-mailhog
    restart: unless-stopped
    ports:
      - "1027:1025"
      - "8027:8025"

  # 마이그레이션 전용 1회성 서비스 — builder 스테이지(전체 node_modules + prisma CLI) 사용.
  # standalone 런너에는 prisma CLI 의존성이 없어 migrate 를 여기서 수행한다.
  migrate:
    build:
      context: .
      dockerfile: Dockerfile
      target: builder
    container_name: linguaclass-p3-migrate
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://lingua:lingua@postgres:5432/linguaclass_p3
    # db push 는 기존 DB 상태와 무관하게 스키마를 동기화(멱등) — 추가 필드가 모두 nullable/기본값/신규
    command: npx prisma db push
    restart: "no"

  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        # NEXT_PUBLIC_* 는 빌드 타임에 인라인되므로 build arg 로도 전달
        NEXT_PUBLIC_TOSS_CLIENT_KEY: ${NEXT_PUBLIC_TOSS_CLIENT_KEY}
    container_name: linguaclass-p3-app
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    ports:
      - "3002:3002"
    environment:
      DATABASE_URL: postgresql://lingua:lingua@postgres:5432/linguaclass_p3
      AUTH_SECRET: ${AUTH_SECRET}
      AUTH_URL: ${AUTH_URL:-http://localhost:3002}
      SMTP_HOST: mailhog
      SMTP_PORT: 1025
      SMTP_FROM: ${SMTP_FROM:-noreply@linguaclass.local}
      CRON_SECRET: ${CRON_SECRET}
      NEXT_PUBLIC_TOSS_CLIENT_KEY: ${NEXT_PUBLIC_TOSS_CLIENT_KEY}
      TOSS_SECRET_KEY: ${TOSS_SECRET_KEY}
    command: node server.js

volumes:
  postgres_data_p3:
