version: "3.9"

services:
  postgres:
    image: postgres:17
    container_name: linguaclass-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: lingua
      POSTGRES_PASSWORD: lingua
      POSTGRES_DB: linguaclass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  mailhog:
    image: mailhog/mailhog:latest
    container_name: linguaclass-mailhog
    restart: unless-stopped
    ports:
      - "1025:1025"
      - "8025:8025"

volumes:
  postgres_data:
